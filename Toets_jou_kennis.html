<!DOCTYPE html>
<html lang="af">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧱 Blok Stapel • Chemie</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0b1120;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e2e8f0;
            padding: 12px;
            margin: 0;
        }

        .game-wrapper {
            width: 100%;
            max-width: 820px;
            background: #111827;
            border-radius: 32px;
            padding: 20px 20px 24px;
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.9);
            border: 1px solid #1e293b;
            position: relative;
            overflow: hidden;
        }

        /* ===== CANVAS ===== */
        .canvas-wrap {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #1a2332;
            aspect-ratio: 800 / 480;
            width: 100%;
            border: 1px solid #2d3a52;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
            cursor: default;
        }

        /* ===== UI UNDER CANVAS ===== */
        .ui-panel {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .question-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: #0f172a;
            padding: 12px 18px;
            border-radius: 16px;
            border-left: 4px solid #3b82f6;
            min-height: 60px;
        }

        .question-row .q-label {
            font-size: 1.5rem;
            font-weight: 500;
            color: #f0f9ff;
            word-break: break-word;
            flex: 1;
            min-width: 120px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .question-row .q-label sub {
            font-size: 0.65em;
            vertical-align: sub;
        }
        .question-row .q-label sup {
            font-size: 0.65em;
            vertical-align: super;
        }

        .question-row .q-hint {
            font-size: 0.8rem;
            color: #94a3b8;
            background: #1e293b;
            padding: 4px 14px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .input-row input {
            flex: 1;
            min-width: 140px;
            padding: 12px 18px;
            border-radius: 40px;
            border: 1px solid #2d3a52;
            background: #0b1220;
            color: white;
            font-size: 1.05rem;
            font-family: 'Courier New', monospace;
            transition: 0.15s;
            outline: none;
        }
        .input-row input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .input-row input::placeholder {
            color: #4b5a77;
        }

        .input-row .btn {
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .btn-primary:hover {
            background: #1d4ed8;
            transform: scale(1.02);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #334155;
            color: #cbd5e1;
        }
        .btn-outline:hover {
            background: #1e293b;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 0 4px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .stats-row span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stats-row .num {
            font-weight: 700;
            color: #e2e8f0;
            font-size: 1.1rem;
        }
        .stats-row .num.gold {
            color: #fbbf24;
        }
        .stats-row .num.green {
            color: #4ade80;
        }
        .stats-row .num.blue {
            color: #60a5fa;
        }

        .feedback-msg {
            font-size: 0.95rem;
            min-height: 28px;
            padding: 4px 6px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .feedback-msg.correct {
            color: #4ade80;
        }
        .feedback-msg.wrong {
            color: #f87171;
        }
        .feedback-msg.info {
            color: #94a3b8;
        }

        /* ===== GAME OVER OVERLAY ===== */
        .game-over-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 20px;
            flex-direction: column;
            padding: 24px;
            animation: fadeIn 0.5s ease;
        }
        .game-over-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .game-over-box {
            background: #1e293b;
            padding: 32px 40px;
            border-radius: 28px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #334155;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        .game-over-box h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #f87171;
            margin-bottom: 4px;
        }
        .game-over-box .sub {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 16px;
        }
        .game-over-box .big-score {
            font-size: 3.2rem;
            font-weight: 700;
            color: #fbbf24;
            line-height: 1.2;
        }
        .game-over-box .big-label {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .game-over-box .divider {
            border: none;
            border-top: 1px solid #334155;
            margin: 16px 0;
        }
        .game-over-box .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 16px;
        }
        .game-over-box .btn-group .btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 20px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .game-wrapper {
                padding: 12px;
            }
            .question-row .q-label {
                font-size: 1.2rem;
            }
            .question-row .q-hint {
                font-size: 0.7rem;
                padding: 2px 10px;
            }
            .input-row input {
                font-size: 0.9rem;
                padding: 10px 14px;
                min-width: 100px;
            }
            .input-row .btn {
                padding: 10px 16px;
                font-size: 0.85rem;
            }
            .game-over-box {
                padding: 24px 20px;
            }
            .game-over-box .big-score {
                font-size: 2.4rem;
            }
            .stats-row {
                gap: 12px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 400px) {
            .question-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
            .question-row .q-hint {
                white-space: normal;
            }
            .input-row {
                flex-direction: column;
                align-items: stretch;
            }
            .input-row input {
                min-width: unset;
            }
            .input-row .btn {
                width: 100%;
            }
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0b1220;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="game-wrapper" id="app">
        <!-- CANVAS -->
        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="gameCanvas" width="800" height="480"></canvas>

            <!-- GAME OVER OVERLAY -->
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-box">
                    <h2>💥 O nee!</h2>
                    <p class="sub">Die mannetjie het afgeval!</p>
                    <div class="big-score" id="finalScore">0</div>
                    <div class="big-label">✅ korrekte antwoorde</div>
                    <hr class="divider" />
                    <div style="display:flex; justify-content:center; gap:20px; color:#94a3b8; font-size:0.9rem;">
                        <span>📦 <span id="finalBlocks" style="color:#e2e8f0;font-weight:600;">0</span> blokke</span>
                        <span>🔥 <span id="finalStreak" style="color:#fbbf24;font-weight:600;">0</span> langste reeks</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="restartGame()">🔄 Probeer weer</button>
                        <button class="btn btn-outline" onclick="quitGame()">🏠 Stoppe</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- UI PANEL -->
        <div class="ui-panel">
            <div class="question-row">
                <span class="q-label" id="qText">H₂O</span>
                <span class="q-hint" id="qHint">📝 tik die naam</span>
            </div>

            <div class="input-row">
                <input type="text" id="answerInput" placeholder="Skryf jou antwoord..." autofocus />
                <button class="btn btn-primary" id="submitBtn">⏎ Bevestig</button>
                <button class="btn btn-danger" id="quitBtn">✕ Stop</button>
            </div>

            <div class="feedback-msg info" id="feedbackMsg">💡 Tik jou antwoord en druk Enter</div>

            <div class="stats-row">
                <span>✅ Korrek: <span class="num green" id="scoreDisplay">0</span></span>
                <span>🔥 Reeks: <span class="num gold" id="streakDisplay">0</span></span>
                <span>📦 Hoogte: <span class="num blue" id="heightDisplay">3</span></span>
                <span>🏆 Beste reeks: <span class="num gold" id="bestStreakDisplay">0</span></span>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //   CHEMIE VRAAGBANK
        // ============================================================
        const CHEM_BANK = [
            // Anione
            { display: "OH⁻", answer: "OH(-1)", name: "hidroksiedioon" },
            { display: "NO₃⁻", answer: "NO3(-1)", name: "nitraatioon" },
            { display: "NO₂⁻", answer: "NO2(-1)", name: "nitrietioon" },
            { display: "MnO₄⁻", answer: "MnO4(-1)", name: "permanganaatioon" },
            { display: "ClO₃⁻", answer: "ClO3(-1)", name: "chloraatioon" },
            { display: "CH₃COO⁻", answer: "CH3COO(-1)", name: "asetaatioon" },
            { display: "HCO₃⁻", answer: "HCO3(-1)", name: "waterstofkarbonaatioon" },
            { display: "HSO₃⁻", answer: "HSO3(-1)", name: "waterstofsulfietioon" },
            { display: "HSO₄⁻", answer: "HSO4(-1)", name: "waterstofsulfaatioon" },
            { display: "SO₄²⁻", answer: "SO4(-2)", name: "sulfaatioon" },
            { display: "MnO₄²⁻", answer: "MnO4(-2)", name: "manganaatioon" },
            { display: "SO₃²⁻", answer: "SO3(-2)", name: "sulfietioon" },
            { display: "CO₃²⁻", answer: "CO3(-2)", name: "karbonaatioon" },
            { display: "CrO₄²⁻", answer: "CrO4(-2)", name: "chromaatioon" },
            { display: "Cr₂O₇²⁻", answer: "Cr2O7(-2)", name: "dichromaatioon" },
            { display: "O₂²⁻", answer: "O2(-2)", name: "peroksiedioon" },
            { display: "PO₄³⁻", answer: "PO4(-3)", name: "fosfaatioon" },
            // Katione
            { display: "NH₄⁺", answer: "NH4(+1)", name: "ammoniumioon" },
            { display: "H₃O⁺", answer: "H3O(+1)", name: "hidroniumioon" },
            // Molekules
            { display: "H₂O", answer: "H2O", name: "water" },
            { display: "NH₃", answer: "NH3", name: "ammoniak" },
            { display: "HCl", answer: "HCl", name: "soutsuur" },
            { display: "H₂SO₄", answer: "H2SO4", name: "swawelsuur" },
            { display: "HNO₃", answer: "HNO3", name: "salpetersuur" },
            { display: "H₂CO₃", answer: "H2CO3", name: "koolsuur" },
            { display: "CH₃COOH", answer: "CH3COOH", name: "asynsuur" },
        ];

        // ============================================================
        //   DOM REFS
        // ============================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const qText = document.getElementById('qText');
        const qHint = document.getElementById('qHint');
        const answerInput = document.getElementById('answerInput');
        const submitBtn = document.getElementById('submitBtn');
        const quitBtn = document.getElementById('quitBtn');
        const feedbackMsg = document.getElementById('feedbackMsg');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const streakDisplay = document.getElementById('streakDisplay');
        const heightDisplay = document.getElementById('heightDisplay');
        const bestStreakDisplay = document.getElementById('bestStreakDisplay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScore = document.getElementById('finalScore');
        const finalBlocks = document.getElementById('finalBlocks');
        const finalStreak = document.getElementById('finalStreak');

        // ============================================================
        //   GAME STATE
        // ============================================================
        const BLOCK_W = 72;
        const BLOCK_H = 32;
        const GROUND_Y = 430;
        const START_BLOCKS = 3;

        let stack = []; // array of color strings, bottom to top
        let score = 0;
        let streak = 0;
        let bestStreak = 0;
        let isGameOver = false;
        let isAnswering = false;

        // current question
        let currentQ = null; // { display, answer, name, type: 'formula'|'name' }
        let currentCorrect = '';

        // character state
        let charY = 0; // y-offset relative to stack top
        let charFalling = false;
        let fallVelocity = 0;
        let fallRotation = 0;
        let charScale = 1;

        // block animation
        let newBlockAnim = 0; // 0..1
        let newBlockColor = '';
        let bounceAnim = 0;

        // clouds
        let clouds = [];

        // ============================================================
        //   INIT
        // ============================================================
        function initGame() {
            // build initial stack
            const colors = getColorPalette();
            stack = [];
            for (let i = 0; i < START_BLOCKS; i++) {
                stack.push(colors[i % colors.length]);
            }
            score = 0;
            streak = 0;
            bestStreak = 0;
            isGameOver = false;
            isAnswering = false;
            charFalling = false;
            fallVelocity = 0;
            fallRotation = 0;
            charScale = 1;
            newBlockAnim = 0;
            bounceAnim = 0;

            gameOverOverlay.classList.remove('show');
            updateStats();
            generateQuestion();
            draw();
            answerInput.disabled = false;
            answerInput.value = '';
            answerInput.focus();
            feedbackMsg.className = 'feedback-msg info';
            feedbackMsg.textContent = '💡 Tik jou antwoord en druk Enter';
        }

        function getColorPalette() {
            return [
                '#ef4444', '#f97316', '#eab308', '#22c55e',
                '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899',
                '#14b8a6', '#f59e0b', '#10b981', '#6366f1',
                '#f472b6', '#34d399', '#60a5fa', '#a78bfa'
            ];
        }

        // ============================================================
        //   VRAAG GENERERING
        // ============================================================
        function generateQuestion() {
            // pick random from bank
            const idx = Math.floor(Math.random() * CHEM_BANK.length);
            const item = CHEM_BANK[idx];
            // decide direction
            const askFormula = Math.random() < 0.5;
            if (askFormula) {
                currentQ = {
                    display: item.display,
                    answer: item.name,
                    type: 'formula',
                    correctAnswer: item.name,
                    hint: '📝 tik die naam'
                };
                qText.innerHTML = item.display;
                qHint.textContent = '📝 tik die naam';
            } else {
                currentQ = {
                    display: item.name,
                    answer: item.answer,
                    type: 'name',
                    correctAnswer: item.answer,
                    hint: '📝 tik die formule (bv. SO4(-2))'
                };
                qText.textContent = item.name;
                qHint.textContent = '📝 tik die formule (bv. SO4(-2))';
            }
            currentCorrect = currentQ.answer;
            answerInput.value = '';
            answerInput.disabled = false;
            answerInput.focus();
            feedbackMsg.className = 'feedback-msg info';
            feedbackMsg.textContent = '💡 Tik jou antwoord...';
        }

        // ============================================================
        //   STATS UPDATE
        // ============================================================
        function updateStats() {
            scoreDisplay.textContent = score;
            streakDisplay.textContent = streak;
            heightDisplay.textContent = stack.length;
            bestStreakDisplay.textContent = bestStreak;
        }

        // ============================================================
        //   ANTWOORD HANTEER
        // ============================================================
        function handleAnswer() {
            if (isGameOver || isAnswering) return;
            const raw = answerInput.value.trim();
            if (raw === '') {
                feedbackMsg.className = 'feedback-msg info';
                feedbackMsg.textContent = '⚠️ Tik eers \'n antwoord';
                return;
            }

            isAnswering = true;
            const userAns = raw.toLowerCase();
            const correct = currentCorrect.toLowerCase();
            const ok = (userAns === correct);

            if (ok) {
                // CORRECT
                score++;
                streak++;
                if (streak > bestStreak) bestStreak = streak;
                feedbackMsg.className = 'feedback-msg correct';
                feedbackMsg.textContent = '✅ Korrek! +1 blok!';
                // add block
                const colors = getColorPalette();
                const newColor = colors[stack.length % colors.length];
                stack.push(newColor);
                newBlockColor = newColor;
                newBlockAnim = 0;
                bounceAnim = 0;
                // char bounce
                charScale = 1.15;
                updateStats();
                answerInput.disabled = true;

                // after delay, next question
                setTimeout(() => {
                    isAnswering = false;
                    generateQuestion();
                    answerInput.disabled = false;
                    answerInput.focus();
                    // reset anim
                    newBlockAnim = 0;
                    charScale = 1;
                    draw();
                }, 500);

            } else {
                // WRONG
                feedbackMsg.className = 'feedback-msg wrong';
                feedbackMsg.textContent = `❌ Foutief! Regte antwoord: ${currentCorrect}`;
                // fall!
                charFalling = true;
                fallVelocity = 0;
                fallRotation = 0;
                isGameOver = true;
                answerInput.disabled = true;
                submitBtn.disabled = true;

                // show game over after fall animation
                setTimeout(() => {
                    finalScore.textContent = score;
                    finalBlocks.textContent = stack.length;
                    finalStreak.textContent = bestStreak;
                    gameOverOverlay.classList.add('show');
                    submitBtn.disabled = false;
                }, 1200);
            }

            updateStats();
            draw();
        }

        // ============================================================
        //   RENDER (CANVAS)
        // ============================================================
        function draw() {
            const W = canvas.width;
            const H = canvas.height;
            ctx.clearRect(0, 0, W, H);

            // ---- BACKGROUND ----
            drawBackground(ctx, W, H);

            // ---- GROUND ----
            drawGround(ctx, W, H);

            // ---- BLOCKS ----
            const stackTopY = drawBlocks(ctx, W, H);

            // ---- CHARACTER ----
            drawCharacter(ctx, W, H, stackTopY);

            // ---- EFFECTS ----
            drawEffects(ctx, W, H);

            // ---- STREAK / SCORE ON CANVAS ----
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = 'bold 14px "Segoe UI",sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`🔥 ${streak}`, 16, 32);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '12px "Segoe UI",sans-serif';
            ctx.fillText(`📦 ${stack.length}`, 16, 52);

            // height marker
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(W - 12, GROUND_Y - stack.length * BLOCK_H - 8, 6, stack.length * BLOCK_H + 8);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '11px "Segoe UI",sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`${stack.length}`, W - 20, GROUND_Y - stack.length * BLOCK_H - 12);
        }

        // ---- BACKGROUND ----
        function drawBackground(ctx, W, H) {
            const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
            grad.addColorStop(0, '#0b2a4a');
            grad.addColorStop(0.3, '#1a4a7a');
            grad.addColorStop(0.6, '#4a8db7');
            grad.addColorStop(0.85, '#87CEEB');
            grad.addColorStop(1, '#b5dffa');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, GROUND_Y);

            // sun
            const sx = W - 90,
                sy = 50,
                sr = 36;
            const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr * 2.5);
            glow.addColorStop(0, 'rgba(255,240,180,0.9)');
            glow.addColorStop(0.3, 'rgba(255,220,120,0.5)');
            glow.addColorStop(1, 'rgba(255,200,80,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(sx, sy, sr * 2.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#fffbe6';
            ctx.shadowColor = 'rgba(255,220,100,0.5)';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(sx, sy, sr, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // clouds
            if (clouds.length === 0) {
                for (let i = 0; i < 6; i++) {
                    clouds.push({
                        x: Math.random() * W,
                        y: 20 + Math.random() * 120,
                        w: 60 + Math.random() * 100,
                        speed: 0.15 + Math.random() * 0.25,
                        opacity: 0.3 + Math.random() * 0.4
                    });
                }
            }
            clouds.forEach(c => {
                c.x += c.speed;
                if (c.x > W + 80) c.x = -c.w - 40;
                ctx.fillStyle = `rgba(255,255,255,${c.opacity})`;
                const r = c.w * 0.45;
                ctx.beginPath();
                ctx.ellipse(c.x, c.y, r, r * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(c.x - r * 0.6, c.y + 6, r * 0.6, r * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(c.x + r * 0.6, c.y + 6, r * 0.6, r * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(c.x - r * 0.3, c.y + 10, r * 0.7, r * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(c.x + r * 0.3, c.y + 10, r * 0.7, r * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();
            });

            // hills
            ctx.fillStyle = 'rgba(34,80,50,0.25)';
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            for (let x = 0; x <= W; x += 2) {
                const y = GROUND_Y - 18 - Math.sin(x * 0.008) * 28 - Math.sin(x * 0.015 + 1.2) * 14;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(W, GROUND_Y);
            ctx.fill();

            ctx.fillStyle = 'rgba(44,100,60,0.2)';
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            for (let x = 0; x <= W; x += 2) {
                const y = GROUND_Y - 10 - Math.sin(x * 0.012 + 3) * 20 - Math.sin(x * 0.02 + 0.5) * 10;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(W, GROUND_Y);
            ctx.fill();
        }

        // ---- GROUND ----
        function drawGround(ctx, W, H) {
            const gY = GROUND_Y;
            // main ground
            const grd = ctx.createLinearGradient(0, gY, 0, H);
            grd.addColorStop(0, '#3a7a4a');
            grd.addColorStop(0.15, '#2d6a3a');
            grd.addColorStop(0.5, '#4a3a2a');
            grd.addColorStop(1, '#2a1f14');
            ctx.fillStyle = grd;
            ctx.fillRect(0, gY, W, H - gY);

            // grass line
            ctx.strokeStyle = '#4a9a5a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let x = 0; x <= W; x += 4) {
                const yy = gY - 2 - Math.sin(x * 0.1) * 3 - Math.sin(x * 0.05 + 2) * 2;
                if (x === 0) ctx.moveTo(x, yy);
                else ctx.lineTo(x, yy);
            }
            ctx.stroke();

            // grass blades
            ctx.strokeStyle = '#4a8a4a';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < 50; i++) {
                const x = (i / 50) * W + Math.sin(i * 1.7) * 12;
                const h = 6 + Math.sin(i * 2.3) * 4;
                ctx.beginPath();
                ctx.moveTo(x, gY);
                ctx.quadraticCurveTo(x + Math.sin(i * 0.9) * 4, gY - h - 2, x + Math.sin(i * 1.1) * 6, gY - h);
                ctx.stroke();
            }
        }

        // ---- BLOCKS ----
        function drawBlocks(ctx, W, H) {
            const total = stack.length;
            const startY = GROUND_Y - BLOCK_H;

            for (let i = 0; i < total; i++) {
                const color = stack[i];
                const y = startY - i * BLOCK_H;
                const x = W / 2 - BLOCK_W / 2;
                const isTop = (i === total - 1);
                const animScale = (isTop && newBlockAnim < 1 && newBlockColor === color) ?
                    0.6 + 0.4 * newBlockAnim :
                    1;

                const bw = BLOCK_W * animScale;
                const bh = BLOCK_H * animScale;
                const ox = (BLOCK_W - bw) / 2;
                const oy = (BLOCK_H - bh) / 2;

                // shadow
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 4;

                // main block
                const grad = ctx.createLinearGradient(x, y, x + bw, y + bh);
                const c = hexToRgb(color);
                grad.addColorStop(0, `rgb(${c.r+40},${c.g+40},${c.b+40})`);
                grad.addColorStop(0.4, color);
                grad.addColorStop(1, `rgb(${c.r-30},${c.g-30},${c.b-30})`);
                ctx.fillStyle = grad;

                const rx = x + ox;
                const ry = y + oy;
                const rw = bw;
                const rh = bh;
                const radius = 4;

                ctx.beginPath();
                ctx.moveTo(rx + radius, ry);
                ctx.lineTo(rx + rw - radius, ry);
                ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + radius);
                ctx.lineTo(rx + rw, ry + rh - radius);
                ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - radius, ry + rh);
                ctx.lineTo(rx + radius, ry + rh);
                ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - radius);
                ctx.lineTo(rx, ry + radius);
                ctx.quadraticCurveTo(rx, ry, rx + radius, ry);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // highlight
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fillRect(rx + 6, ry + 3, rw - 12, 4);

                // border
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1;
                ctx.strokeRect(rx, ry, rw, rh);
            }

            // return the Y position of the top of the stack (where character stands)
            const topY = GROUND_Y - total * BLOCK_H;
            return topY;
        }

        // ---- CHARACTER ----
        function drawCharacter(ctx, W, H, stackTopY) {
            const cx = W / 2;
            let cy = stackTopY - 8;

            // falling
            if (charFalling) {
                fallVelocity += 0.6;
                cy += fallVelocity;
                fallRotation += 0.06;
                if (cy > GROUND_Y + 60) {
                    charFalling = false;
                }
            }

            // bounce
            if (bounceAnim < 1) {
                bounceAnim += 0.08;
                const b = Math.sin(bounceAnim * Math.PI * 2) * 4 * (1 - bounceAnim);
                cy += b;
            }

            // scale
            const sc = charScale;
            if (sc > 1) {
                charScale += (1 - charScale) * 0.08;
                if (Math.abs(charScale - 1) < 0.01) charScale = 1;
            }

            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(sc, sc);
            if (charFalling) {
                ctx.rotate(fallRotation);
            }

            const s = 1;

            // shadow
            ctx.shadowColor = 'rgba(0,0,0,0.25)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 4;

            // ---- body ----
            const bodyColor = '#3b82f6';
            const skinColor = '#fcd9b8';
            const darkSkin = '#e8c4a0';

            // legs
            ctx.shadowBlur = 6;
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(-8 * s, 2 * s, 5 * s, 14 * s);
            ctx.fillRect(3 * s, 2 * s, 5 * s, 14 * s);

            // shoes
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(-10 * s, 14 * s, 9 * s, 5 * s);
            ctx.fillRect(1 * s, 14 * s, 9 * s, 5 * s);

            // body (torso)
            ctx.shadowBlur = 12;
            const bodyGrad = ctx.createLinearGradient(0, -20 * s, 0, 6 * s);
            bodyGrad.addColorStop(0, '#60a5fa');
            bodyGrad.addColorStop(1, '#2563eb');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.roundRect(-14 * s, -20 * s, 28 * s, 28 * s, 6 * s);
            ctx.fill();

            // arms
            ctx.shadowBlur = 6;
            ctx.fillStyle = skinColor;
            // left arm
            ctx.save();
            ctx.translate(-16 * s, -14 * s);
            ctx.rotate(-0.2 + Math.sin(Date.now() * 0.003) * 0.06);
            ctx.fillRect(-2 * s, 0, 5 * s, 18 * s);
            ctx.restore();
            // right arm
            ctx.save();
            ctx.translate(16 * s, -14 * s);
            ctx.rotate(0.2 - Math.sin(Date.now() * 0.003 + 1) * 0.06);
            ctx.fillRect(-3 * s, 0, 5 * s, 18 * s);
            ctx.restore();

            // head
            ctx.shadowBlur = 10;
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.arc(0, -26 * s, 16 * s, 0, Math.PI * 2);
            ctx.fill();

            // hair
            ctx.fillStyle = '#4a3728';
            ctx.beginPath();
            ctx.ellipse(0, -34 * s, 16 * s, 8 * s, 0, Math.PI, 0);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(-10 * s, -30 * s, 8 * s, 6 * s, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(10 * s, -30 * s, 8 * s, 6 * s, 0.3, 0, Math.PI * 2);
            ctx.fill();

            // eyes
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.ellipse(-6 * s, -28 * s, 5 * s, 6 * s, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(6 * s, -28 * s, 5 * s, 6 * s, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(-5 * s, -27 * s, 2.8 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(7 * s, -27 * s, 2.8 * s, 0, Math.PI * 2);
            ctx.fill();

            // eye shine
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath();
            ctx.arc(-4 * s, -29 * s, 1.2 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(8 * s, -29 * s, 1.2 * s, 0, Math.PI * 2);
            ctx.fill();

            // mouth (smile)
            ctx.strokeStyle = '#8a5a4a';
            ctx.lineWidth = 1.5 * s;
            ctx.beginPath();
            ctx.arc(0, -22 * s, 6 * s, 0.1, Math.PI - 0.1);
            ctx.stroke();

            // cheeks
            ctx.fillStyle = 'rgba(255,150,150,0.25)';
            ctx.beginPath();
            ctx.ellipse(-12 * s, -24 * s, 4 * s, 3 * s, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(12 * s, -24 * s, 4 * s, 3 * s, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            ctx.restore();
        }

        // ---- EFFECTS ----
        function drawEffects(ctx, W, H) {
            // new block particle effect
            if (newBlockAnim < 1) {
                newBlockAnim += 0.04;
                if (newBlockAnim > 1) newBlockAnim = 1;
                // sparkles
                const count = 12;
                const progress = newBlockAnim;
                const color = newBlockColor || '#fbbf24';
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2 + progress * 0.5;
                    const dist = 30 + progress * 60;
                    const x = W / 2 + Math.cos(angle) * dist * progress;
                    const y = GROUND_Y - stack.length * BLOCK_H - 10 + Math.sin(angle) * dist * progress * 0.4;
                    const size = 3 + Math.random() * 4 * (1 - progress * 0.5);
                    ctx.globalAlpha = 0.8 * (1 - progress * 0.7);
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            // falling dust
            if (charFalling) {
                const count = 10;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 20 + Math.random() * 40;
                    const x = W / 2 + Math.cos(angle) * dist;
                    const y = GROUND_Y - stack.length * BLOCK_H - 4 + Math.sin(angle) * dist * 0.3;
                    const size = 2 + Math.random() * 6;
                    ctx.globalAlpha = 0.4 * (1 - Math.random() * 0.5);
                    ctx.fillStyle = '#b8a080';
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
        }

        // ---- helper: roundRect ----
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (r > w / 2) r = w / 2;
            if (r > h / 2) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        // ---- hex to rgb ----
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 100, g: 100, b: 100 };
        }

        // ============================================================
        //   GAME LOOP
        // ============================================================
        let animFrame = null;

        function gameLoop() {
            draw();
            animFrame = requestAnimationFrame(gameLoop);
        }

        // ============================================================
        //   RESTART / QUIT
        // ============================================================
        function restartGame() {
            if (animFrame) cancelAnimationFrame(animFrame);
            initGame();
            if (animFrame) cancelAnimationFrame(animFrame);
            gameLoop();
        }

        function quitGame() {
            if (animFrame) cancelAnimationFrame(animFrame);
            // show a simple reset
            gameOverOverlay.classList.remove('show');
            initGame();
            if (animFrame) cancelAnimationFrame(animFrame);
            gameLoop();
            // focus input
            answerInput.focus();
        }

        // expose to global for inline onclick
        window.restartGame = restartGame;
        window.quitGame = quitGame;

        // ============================================================
        //   EVENT LISTENERS
        // ============================================================
        submitBtn.addEventListener('click', handleAnswer);

        answerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (!isGameOver && !isAnswering) {
                    handleAnswer();
                }
            }
        });

        quitBtn.addEventListener('click', () => {
            if (isGameOver) {
                quitGame();
            } else {
                // confirm quit
                if (confirm('Wil jy die spel stop? Jou vordering gaan verlore.')) {
                    quitGame();
                }
            }
        });

        // click on canvas to focus input
        canvas.addEventListener('click', () => {
            if (!isGameOver) answerInput.focus();
        });

        // ============================================================
        //   START
        // ============================================================
        initGame();
        gameLoop();
        answerInput.focus();

        console.log('🧱 Blok Stapel Chemie • Speel tot jy verloor!');
        console.log('📚 Vraagbank:', CHEM_BANK.length, 'items');
    </script>
