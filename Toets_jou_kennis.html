<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<title>Chemie Toets</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 95%;
        max-width: 700px;
        margin-top: 30px;
        background: #111827;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 { text-align: center; }

    .progress {
        height: 10px;
        background: #1f2937;
        border-radius: 5px;
        margin-bottom: 10px;
    }

    .bar {
        height: 10px;
        background: #22c55e;
        width: 0%;
        border-radius: 5px;
        transition: width 0.3s;
    }

    .qnum {
        margin-bottom: 10px;
        color: #93c5fd;
    }

    .question {
        font-size: 20px;
        margin: 20px 0;
    }

    input {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        margin-bottom: 10px;
    }

    button {
        padding: 10px;
        border: none;
        border-radius: 8px;
        margin: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    .check { background: #3b82f6; color: white; }
    .next { background: #22c55e; color: white; }
    .stop { background: #ef4444; color: white; }

    .result {
        font-size: 18px;
        margin-top: 10px;
    }

    .correct { color: #22c55e; }
    .wrong { color: #ef4444; }

    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
    }

    td, th {
        border: 1px solid #374151;
        padding: 8px;
        text-align: center;
    }

    .confetti {
        font-size: 30px;
        text-align: center;
        animation: pop 1s ease infinite;
    }

    @keyframes pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }
</style>
</head>

<body>

<div class="container">
    <h1>⚗️ Chemie Toets</h1>

    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="qnum" id="qnum"></div>

    <div class="question" id="question"></div>

    <input id="answer" placeholder="Tik jou antwoord...">

    <div>
        <button class="check" onclick="check()">Kontroleer</button>
        <button class="next" onclick="next()">Volgende</button>
        <button class="stop" onclick="stopTest()">Stop Toets</button>
    </div>

    <div class="result" id="result"></div>

    <div id="review"></div>
</div>

<script>
const data = [
    {q:"OH⁻", a:["hidroksied","hydroxide"]},
    {q:"NO3⁻", a:["nitraation"]},
    {q:"NH4⁺", a:["ammonium"]},
    {q:"H2O", a:["water"]},
    {q:"CO3²⁻", a:["karbonaation"]},
    {q:"ClO3⁻", a:["chloraation"]},
    {q:"SO4²⁻", a:["sulfaatioon"]},
    {q:"PO4³⁻", a:["fosfaation"]},
    {q:"HCl", a:["soutsuur"]},
    {q:"NO2⁻", a:["nitrietioon"]}
];

let index = 0;
let score = 0;
let answers = [];

function normalize(input){
    return input.toLowerCase()
        .replace(/\s/g,'')
        .replace(/−/g,'-')
        .replace(/\(.*?\)/g,'');
}

function show(){
    document.getElementById("question").innerText = data[index].q;
    document.getElementById("qnum").innerText = `Vraag ${index+1} van ${data.length}`;
    document.getElementById("bar").style.width = ((index)/data.length)*100 + "%";
    document.getElementById("answer").value = "";
}

function check(){
    let user = normalize(document.getElementById("answer").value);
    let correct = data[index].a.some(a => normalize(a) === user);

    if(correct){
        document.getElementById("result").innerHTML = "✔ Reg!";
        document.getElementById("result").className = "result correct";
        score++;
    } else {
        document.getElementById("result").innerHTML = "✖ Verkeerd!";
        document.getElementById("result").className = "result wrong";
    }

    answers.push({
        q: data[index].q,
        user: document.getElementById("answer").value,
        correct: data[index].a[0],
        ok: correct
    });

    setTimeout(next, 1500);
}

function next(){
    index++;
    if(index >= data.length){
        finish();
        return;
    }
    show();
    document.getElementById("result").innerHTML = "";
}

function finish(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("question").innerHTML = "🎉 Toets Voltooi!";
    document.getElementById("qnum").innerHTML = "";
    document.getElementById("answer").style.display = "none";

    let percent = Math.round((score/data.length)*100);

    document.getElementById("result").innerHTML =
        `Punt: ${score}/${data.length} (${percent}%) <div class="confetti">🎊</div>`;

    reviewAsk();
}

function stopTest(){
    let percent = Math.round((score/(index||1))*100);
    alert(`Gestop!\nScore: ${score}/${index}\n${percent}%`);
}

function reviewAsk(){
    setTimeout(()=>{
        if(confirm("Wil jy deur jou antwoorde gaan?")){
            review();
        }
    },500);
}

function review(){
    let html = "<h3>📋 Hersiening</h3><table><tr><th>Vraag</th><th>Jou antwoord</th><th>Regte antwoord</th><th>Status</th></tr>";

    answers.forEach(a=>{
        html += `<tr style="background:${a.ok?'#14532d':'#7f1d1d'}">
            <td>${a.q}</td>
            <td style="color:#60a5fa">${a.user}</td>
            <td style="color:#22c55e">${a.correct}</td>
            <td>${a.ok ? "✔" : "✖"}</td>
        </tr>`;
    });

    html += "</table>";
    document.getElementById("review").innerHTML = html;
}

show();
</script>

</body>
</html>
