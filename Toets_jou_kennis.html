<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<title>Chemie Toets</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        margin: 0;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 95%;
        max-width: 700px;
        margin-top: 30px;
        background: #111827;
        padding: 20px;
        border-radius: 12px;
    }

    h1 { text-align: center; }

    input, select {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        font-size: 16px;
    }

    button {
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
    }

    .start { background: #3b82f6; color: white; width: 100%; }

    .progress {
        height: 10px;
        background: #1f2937;
        border-radius: 5px;
        margin-bottom: 10px;
    }

    .bar {
        height: 10px;
        background: #22c55e;
        width: 0%;
        border-radius: 5px;
    }

    .qnum { color: #93c5fd; margin-bottom: 10px; }

    .question { font-size: 20px; margin: 20px 0; }

    .options button {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        border: none;
        border-radius: 8px;
        background: #374151;
        color: white;
    }

    .options button:hover {
        background: #4b5563;
    }

    .result { margin-top: 10px; font-size: 18px; }

    .hidden { display: none; }
</style>
</head>

<body>

<div class="container">

<!-- START -->
<div id="startScreen">
    <h1>⚗️ Chemie Toets</h1>

    <label>Aantal vrae (5 - 50):</label>
    <input type="number" id="amount" min="5" max="50" value="10">

    <label>Toets tipe:</label>
    <select id="mode">
        <option value="typed">✍️ Tik-antwoord</option>
        <option value="mcq">🔘 Veelkeuse</option>
    </select>

    <button class="start" onclick="startQuiz()">Begin Toets</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">

    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="qnum" id="qnum"></div>

    <div class="question" id="question"></div>

    <input id="answerBox" class="hidden" placeholder="Tik jou antwoord...">

    <div class="options" id="options"></div>

    <div class="result" id="result"></div>
</div>

</div>

<script>

const data = [
    {q:"OH⁻", a:"hidroksied"},
    {q:"NO3⁻", a:"nitraation"},
    {q:"NH4⁺", a:"ammonium"},
    {q:"H2O", a:"water"},
    {q:"CO3²⁻", a:"karbonaation"},
    {q:"ClO3⁻", a:"chloraation"},
    {q:"SO4²⁻", a:"sulfaatioon"},
    {q:"PO4³⁻", a:"fosfaation"},
    {q:"HCl", a:"soutsuur"},
    {q:"NO2⁻", a:"nitrietioon"}
];

let quizData = [];
let index = 0;
let score = 0;
let answers = [];
let mode = "typed";

function shuffle(arr){
    return arr.sort(() => Math.random() - 0.5);
}

function startQuiz(){
    let amount = parseInt(document.getElementById("amount").value);
    mode = document.getElementById("mode").value;

    if(amount < 5) amount = 5;
    if(amount > 50) amount = 50;
    if(amount > data.length) amount = data.length;

    quizData = shuffle([...data]).slice(0, amount);

    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    show();
}

function makeOptions(correct){
    let options = new Set();
    options.add(correct);

    while(options.size < 4){
        options.add(data[Math.floor(Math.random() * data.length)].a);
    }

    return shuffle([...options]);
}

function show(){
    document.getElementById("result").innerHTML = "";
    document.getElementById("answerBox").value = "";

    let q = quizData[index];

    document.getElementById("question").innerText = q.q;
    document.getElementById("qnum").innerText =
        `Vraag ${index+1} van ${quizData.length}`;

    document.getElementById("bar").style.width =
        (index / quizData.length) * 100 + "%";

    // MODE SWITCH
    if(mode === "typed"){
        document.getElementById("answerBox").classList.remove("hidden");
        document.getElementById("options").innerHTML = "";
    } 
    else {
        document.getElementById("answerBox").classList.add("hidden");

        let opts = makeOptions(q.a);

        let html = "";
        opts.forEach(o => {
            html += `<button onclick="check('${o}')">${o}</button>`;
        });

        document.getElementById("options").innerHTML = html;
    }
}

function check(answer){
    let correct = quizData[index].a;

    let ok = answer === correct;

    if(ok){
        score++;
        document.getElementById("result").innerHTML = "✔ Reg!";
    } else {
        document.getElementById("result").innerHTML =
            `✖ Verkeerd! Regte antwoord: ${correct}`;
    }

    next();
}

function checkTyped(){
    let user = document.getElementById("answerBox").value.toLowerCase().trim();
    let correct = quizData[index].a.toLowerCase();

    let ok = user === correct;

    if(ok){
        score++;
        document.getElementById("result").innerHTML = "✔ Reg!";
    } else {
        document.getElementById("result").innerHTML =
            `✖ Verkeerd! Regte antwoord: ${quizData[index].a}`;
    }

    next();
}

document.addEventListener("keydown", function(e){
    if(e.key === "Enter" && mode === "typed"){
        checkTyped();
    }
});

function next(){
    index++;

    if(index >= quizData.length){
        finish();
        return;
    }

    setTimeout(show, 800);
}

function finish(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("question").innerHTML = "🎉 Toets Voltooi!";
    document.getElementById("options").innerHTML = "";
    document.getElementById("answerBox").classList.add("hidden");

    let percent = Math.round((score/quizData.length)*100);

    document.getElementById("result").innerHTML =
        `Punt: ${score}/${quizData.length} (${percent}%)`;
}

</script>

</body>
</html>
