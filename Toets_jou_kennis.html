<!DOCTYPE html>
<html lang="af">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧱 Blok Stapel • Chemie • Ruimte</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0b1120;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e2e8f0;
            padding: 12px;
            margin: 0;
        }

        .game-wrapper {
            width: 100%;
            max-width: 820px;
            background: #111827;
            border-radius: 32px;
            padding: 20px 20px 24px;
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.9);
            border: 1px solid #1e293b;
            position: relative;
            overflow: hidden;
        }

        .canvas-wrap {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #1a2332;
            aspect-ratio: 800 / 480;
            width: 100%;
            border: 1px solid #2d3a52;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
            cursor: default;
        }

        .ui-panel {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .question-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: #0f172a;
            padding: 12px 18px;
            border-radius: 16px;
            border-left: 4px solid #3b82f6;
            min-height: 60px;
        }

        .question-row .q-label {
            font-size: 1.5rem;
            font-weight: 500;
            color: #f0f9ff;
            word-break: break-word;
            flex: 1;
            min-width: 120px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .question-row .q-label sub {
            font-size: 0.65em;
            vertical-align: sub;
        }
        .question-row .q-label sup {
            font-size: 0.65em;
            vertical-align: super;
        }

        .question-row .q-hint {
            font-size: 0.8rem;
            color: #94a3b8;
            background: #1e293b;
            padding: 4px 14px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .input-row input {
            flex: 1;
            min-width: 140px;
            padding: 12px 18px;
            border-radius: 40px;
            border: 1px solid #2d3a52;
            background: #0b1220;
            color: white;
            font-size: 1.05rem;
            font-family: 'Courier New', monospace;
            transition: 0.15s;
            outline: none;
        }
        .input-row input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .input-row input::placeholder {
            color: #4b5a77;
        }

        .input-row .btn {
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .btn-primary:hover {
            background: #1d4ed8;
            transform: scale(1.02);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #334155;
            color: #cbd5e1;
        }
        .btn-outline:hover {
            background: #1e293b;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 0 4px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .stats-row span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stats-row .num {
            font-weight: 700;
            color: #e2e8f0;
            font-size: 1.1rem;
        }
        .stats-row .num.gold {
            color: #fbbf24;
        }
        .stats-row .num.green {
            color: #4ade80;
        }
        .stats-row .num.blue {
            color: #60a5fa;
        }

        .feedback-msg {
            font-size: 0.95rem;
            min-height: 28px;
            padding: 4px 6px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .feedback-msg.correct {
            color: #4ade80;
        }
        .feedback-msg.wrong {
            color: #f87171;
        }
        .feedback-msg.info {
            color: #94a3b8;
        }

        .game-over-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 20px;
            flex-direction: column;
            padding: 24px;
            animation: fadeIn 0.5s ease;
        }
        .game-over-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .game-over-box {
            background: #1e293b;
            padding: 32px 40px;
            border-radius: 28px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #334155;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        .game-over-box h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #f87171;
            margin-bottom: 4px;
        }
        .game-over-box .sub {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 16px;
        }
        .game-over-box .big-score {
            font-size: 3.2rem;
            font-weight: 700;
            color: #fbbf24;
            line-height: 1.2;
        }
        .game-over-box .big-label {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .game-over-box .divider {
            border: none;
            border-top: 1px solid #334155;
            margin: 16px 0;
        }
        .game-over-box .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 16px;
        }
        .game-over-box .btn-group .btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 20px;
        }

        @media (max-width: 600px) {
            .game-wrapper {
                padding: 12px;
            }
            .question-row .q-label {
                font-size: 1.2rem;
            }
            .question-row .q-hint {
                font-size: 0.7rem;
                padding: 2px 10px;
            }
            .input-row input {
                font-size: 0.9rem;
                padding: 10px 14px;
                min-width: 100px;
            }
            .input-row .btn {
                padding: 10px 16px;
                font-size: 0.85rem;
            }
            .game-over-box {
                padding: 24px 20px;
            }
            .game-over-box .big-score {
                font-size: 2.4rem;
            }
            .stats-row {
                gap: 12px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 400px) {
            .question-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
            .question-row .q-hint {
                white-space: normal;
            }
            .input-row {
                flex-direction: column;
                align-items: stretch;
            }
            .input-row input {
                min-width: unset;
            }
            .input-row .btn {
                width: 100%;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0b1220;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="game-wrapper" id="app">
        <!-- CANVAS -->
        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="gameCanvas" width="800" height="480"></canvas>

            <!-- GAME OVER OVERLAY -->
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-box">
                    <h2>💥 O nee!</h2>
                    <p class="sub">Die mannetjie het afgeval!</p>
                    <div class="big-score" id="finalScore">0</div>
                    <div class="big-label">✅ korrekte antwoorde</div>
                    <hr class="divider" />
                    <div style="display:flex; justify-content:center; gap:20px; color:#94a3b8; font-size:0.9rem;">
                        <span>📦 <span id="finalBlocks" style="color:#e2e8f0;font-weight:600;">0</span> blokke</span>
                        <span>🔥 <span id="finalStreak" style="color:#fbbf24;font-weight:600;">0</span> langste reeks</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="restartGame()">🔄 Probeer weer</button>
                        <button class="btn btn-outline" onclick="quitGame()">🏠 Stoppe</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- UI PANEL -->
        <div class="ui-panel">
            <div class="question-row">
                <span class="q-label" id="qText">H₂O</span>
                <span class="q-hint" id="qHint">📝 tik die naam</span>
            </div>

            <div class="input-row">
                <input type="text" id="answerInput" placeholder="Skryf jou antwoord..." autofocus />
                <button class="btn btn-primary" id="submitBtn">⏎ Bevestig</button>
                <button class="btn btn-danger" id="quitBtn">✕ Stop</button>
            </div>

            <div class="feedback-msg info" id="feedbackMsg">💡 Tik jou antwoord en druk Enter</div>

            <div class="stats-row">
                <span>✅ Korrek: <span class="num green" id="scoreDisplay">0</span></span>
                <span>🔥 Reeks: <span class="num gold" id="streakDisplay">0</span></span>
                <span>📦 Hoogte: <span class="num blue" id="heightDisplay">3</span></span>
                <span>🏆 Beste reeks: <span class="num gold" id="bestStreakDisplay">0</span></span>
                <span>🌍 <span class="num" id="levelDisplay" style="color:#4ade80;">3</span></span>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //   CHEMIE VRAAGBANK
        // ============================================================
        const CHEM_BANK = [
            // Anione
            { display: "OH⁻", answer: "OH(-1)", name: "hidroksiedioon" },
            { display: "NO₃⁻", answer: "NO3(-1)", name: "nitraatioon" },
            { display: "NO₂⁻", answer: "NO2(-1)", name: "nitrietioon" },
            { display: "MnO₄⁻", answer: "MnO4(-1)", name: "permanganaatioon" },
            { display: "ClO₃⁻", answer: "ClO3(-1)", name: "chloraatioon" },
            { display: "CH₃COO⁻", answer: "CH3COO(-1)", name: "asetaatioon" },
            { display: "HCO₃⁻", answer: "HCO3(-1)", name: "waterstofkarbonaatioon" },
            { display: "HSO₃⁻", answer: "HSO3(-1)", name: "waterstofsulfietioon" },
            { display: "HSO₄⁻", answer: "HSO4(-1)", name: "waterstofsulfaatioon" },
            { display: "SO₄²⁻", answer: "SO4(-2)", name: "sulfaatioon" },
            { display: "MnO₄²⁻", answer: "MnO4(-2)", name: "manganaatioon" },
            { display: "SO₃²⁻", answer: "SO3(-2)", name: "sulfietioon" },
            { display: "CO₃²⁻", answer: "CO3(-2)", name: "karbonaatioon" },
            { display: "CrO₄²⁻", answer: "CrO4(-2)", name: "chromaatioon" },
            { display: "Cr₂O₇²⁻", answer: "Cr2O7(-2)", name: "dichromaatioon" },
            { display: "O₂²⁻", answer: "O2(-2)", name: "peroksiedioon" },
            { display: "PO₄³⁻", answer: "PO4(-3)", name: "fosfaatioon" },
            // Katione
            { display: "NH₄⁺", answer: "NH4(+1)", name: "ammoniumioon" },
            { display: "H₃O⁺", answer: "H3O(+1)", name: "hidroniumioon" },
            // Molekules
            { display: "H₂O", answer: "H2O", name: "water" },
            { display: "NH₃", answer: "NH3", name: "ammoniak" },
            { display: "HCl", answer: "HCl", name: "soutsuur" },
            { display: "H₂SO₄", answer: "H2SO4", name: "swawelsuur" },
            { display: "HNO₃", answer: "HNO3", name: "salpetersuur" },
            { display: "H₂CO₃", answer: "H2CO3", name: "koolsuur" },
            { display: "CH₃COOH", answer: "CH3COOH", name: "asynsuur" },
        ];

        // ============================================================
        //   DOM REFS
        // ============================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const qText = document.getElementById('qText');
        const qHint = document.getElementById('qHint');
        const answerInput = document.getElementById('answerInput');
        const submitBtn = document.getElementById('submitBtn');
        const quitBtn = document.getElementById('quitBtn');
        const feedbackMsg = document.getElementById('feedbackMsg');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const streakDisplay = document.getElementById('streakDisplay');
        const heightDisplay = document.getElementById('heightDisplay');
        const bestStreakDisplay = document.getElementById('bestStreakDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScore = document.getElementById('finalScore');
        const finalBlocks = document.getElementById('finalBlocks');
        const finalStreak = document.getElementById('finalStreak');

        // ============================================================
        //   GAME STATE
        // ============================================================
        const BLOCK_W = 72;
        const BLOCK_H = 32;
        const GROUND_Y = 430;
        const START_BLOCKS = 3;
        const CHAR_SCREEN_Y = 160;

        let stack = [];
        let score = 0;
        let streak = 0;
        let bestStreak = 0;
        let isGameOver = false;
        let isAnswering = false;

        let currentQ = null;
        let currentCorrect = '';

        let charY = 0;
        let charFalling = false;
        let fallVelocity = 0;
        let fallRotation = 0;
        let charScale = 1;

        let newBlockAnim = 0;
        let newBlockColor = '';
        let bounceAnim = 0;

        let cameraOffset = 0;

        // Stars
        let stars = [];

        // Flying objects: rocks & satellites
        let flyingObjects = [];
        let spawnTimer = 0;
        let spawnInterval = 90; // frames

        // ============================================================
        //   INIT
        // ============================================================
        function initGame() {
            const colors = getColorPalette();
            stack = [];
            for (let i = 0; i < START_BLOCKS; i++) {
                stack.push(colors[i % colors.length]);
            }
            score = 0;
            streak = 0;
            bestStreak = 0;
            isGameOver = false;
            isAnswering = false;
            charFalling = false;
            fallVelocity = 0;
            fallRotation = 0;
            charScale = 1;
            newBlockAnim = 0;
            bounceAnim = 0;
            cameraOffset = 0;
            flyingObjects = [];
            spawnTimer = 0;

            // Generate stars
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * 800,
                    y: Math.random() * 480,
                    r: 0.4 + Math.random() * 1.8,
                    a: 0.2 + Math.random() * 0.8,
                    twinkle: 0.015 + Math.random() * 0.04,
                    phase: Math.random() * Math.PI * 2
                });
            }

            gameOverOverlay.classList.remove('show');
            updateStats();
            generateQuestion();
            draw();
            answerInput.disabled = false;
            answerInput.value = '';
            answerInput.focus();
            feedbackMsg.className = 'feedback-msg info';
            feedbackMsg.textContent = '💡 Tik jou antwoord en druk Enter';
        }

        function getColorPalette() {
            return [
                '#ef4444', '#f97316', '#eab308', '#22c55e',
                '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899',
                '#14b8a6', '#f59e0b', '#10b981', '#6366f1',
                '#f472b6', '#34d399', '#60a5fa', '#a78bfa'
            ];
        }

        // ============================================================
        //   VRAAG GENERERING
        // ============================================================
        function generateQuestion() {
            const idx = Math.floor(Math.random() * CHEM_BANK.length);
            const item = CHEM_BANK[idx];
            const askFormula = Math.random() < 0.5;
            if (askFormula) {
                currentQ = {
                    display: item.display,
                    answer: item.name,
                    type: 'formula',
                    correctAnswer: item.name,
                    hint: '📝 tik die naam'
                };
                qText.innerHTML = item.display;
                qHint.textContent = '📝 tik die naam';
            } else {
                currentQ = {
                    display: item.name,
                    answer: item.answer,
                    type: 'name',
                    correctAnswer: item.answer,
                    hint: '📝 tik die formule (bv. SO4(-2))'
                };
                qText.textContent = item.name;
                qHint.textContent = '📝 tik die formule (bv. SO4(-2))';
            }
            currentCorrect = currentQ.answer;
            answerInput.value = '';
            answerInput.disabled = false;
            answerInput.focus();
            feedbackMsg.className = 'feedback-msg info';
            feedbackMsg.textContent = '💡 Tik jou antwoord...';
        }

        // ============================================================
        //   STATS UPDATE
        // ============================================================
        function updateStats() {
            scoreDisplay.textContent = score;
            streakDisplay.textContent = streak;
            heightDisplay.textContent = stack.length;
            bestStreakDisplay.textContent = bestStreak;
            levelDisplay.textContent = stack.length;
        }

        // ============================================================
        //   ANTWOORD HANTEER
        // ============================================================
        function handleAnswer() {
            if (isGameOver || isAnswering) return;
            const raw = answerInput.value.trim();
            if (raw === '') {
                feedbackMsg.className = 'feedback-msg info';
                feedbackMsg.textContent = '⚠️ Tik eers \'n antwoord';
                return;
            }

            isAnswering = true;
            const userAns = raw.toLowerCase();
            const correct = currentCorrect.toLowerCase();
            const ok = (userAns === correct);

            if (ok) {
                score++;
                streak++;
                if (streak > bestStreak) bestStreak = streak;
                feedbackMsg.className = 'feedback-msg correct';
                feedbackMsg.textContent = '✅ Korrek! +1 blok!';
                const colors = getColorPalette();
                const newColor = colors[stack.length % colors.length];
                stack.push(newColor);
                newBlockColor = newColor;
                newBlockAnim = 0;
                bounceAnim = 0;
                charScale = 1.15;
                updateStats();
                answerInput.disabled = true;

                setTimeout(() => {
                    isAnswering = false;
                    generateQuestion();
                    answerInput.disabled = false;
                    answerInput.focus();
                    newBlockAnim = 0;
                    charScale = 1;
                    draw();
                }, 500);

            } else {
                feedbackMsg.className = 'feedback-msg wrong';
                feedbackMsg.textContent = `❌ Foutief! Regte antwoord: ${currentCorrect}`;
                charFalling = true;
                fallVelocity = 0;
                fallRotation = 0;
                isGameOver = true;
                answerInput.disabled = true;
                submitBtn.disabled = true;

                setTimeout(() => {
                    finalScore.textContent = score;
                    finalBlocks.textContent = stack.length;
                    finalStreak.textContent = bestStreak;
                    gameOverOverlay.classList.add('show');
                    submitBtn.disabled = false;
                }, 1200);
            }

            updateStats();
            draw();
        }

        // ============================================================
        //   CAMERA
        // ============================================================
        function getStackTopY() {
            return GROUND_Y - stack.length * BLOCK_H;
        }

        function updateCamera() {
            const stackTop = getStackTopY();
            const charWorldY = stackTop - 8;
            const targetOffset = charWorldY - CHAR_SCREEN_Y;
            cameraOffset += (targetOffset - cameraOffset) * 0.12;
            if (Math.abs(cameraOffset - targetOffset) < 0.5) {
                cameraOffset = targetOffset;
            }
        }

        // ============================================================
        //   FLYING OBJECTS
        // ============================================================
        function spawnFlyingObject() {
            const lvl = stack.length;
            if (lvl < 14) return; // eers vanaf level 14

            const type = Math.random() < 0.55 ? 'rock' : 'satellite';
            const y = 30 + Math.random() * 340;
            const speed = 0.8 + Math.random() * 1.8 + (lvl - 14) * 0.06;
            const size = 16 + Math.random() * 28;

            let obj = {
                x: 850,
                y: y,
                type: type,
                speed: speed,
                size: size,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.025,
                // vir rotse: onreëlmatige vorm
                vertices: [],
                // vir satelliet: sonpaneel hoek
                panelAngle: 0,
                panelSpeed: (Math.random() - 0.5) * 0.01,
            };

            if (type === 'rock') {
                const n = 5 + Math.floor(Math.random() * 4);
                for (let i = 0; i < n; i++) {
                    const angle = (i / n) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
                    const radius = size * (0.6 + Math.random() * 0.4);
                    obj.vertices.push({ angle: angle, radius: radius });
                }
            }

            flyingObjects.push(obj);
        }

        function updateFlyingObjects() {
            const lvl = stack.length;

            // Spawn frekwensie
            if (lvl >= 14) {
                const baseInterval = Math.max(30, 100 - (lvl - 14) * 3);
                spawnTimer++;
                if (spawnTimer > baseInterval + Math.random() * 40) {
                    spawnFlyingObject();
                    spawnTimer = 0;
                }
            }

            // Update bestaande objekte
            for (let i = flyingObjects.length - 1; i >= 0; i--) {
                const obj = flyingObjects[i];
                obj.x -= obj.speed;
                obj.rotation += obj.rotSpeed;
                if (obj.type === 'satellite') {
                    obj.panelAngle += obj.panelSpeed;
                }
                if (obj.x < -100) {
                    flyingObjects.splice(i, 1);
                }
            }

            // Maksimum aantal objekte
            if (flyingObjects.length > 12) {
                flyingObjects.splice(0, flyingObjects.length - 12);
            }
        }

        function drawFlyingObjects(ctx) {
            for (const obj of flyingObjects) {
                ctx.save();
                ctx.translate(obj.x, obj.y);
                ctx.rotate(obj.rotation);

                if (obj.type === 'rock') {
                    // Rots – onreëlmatige vorm
                    const c = 60 + Math.random() * 30;
                    const grad = ctx.createRadialGradient(-4, -4, 2, 0, 0, obj.size);
                    grad.addColorStop(0, `rgb(${c+50},${c+30},${c+10})`);
                    grad.addColorStop(0.6, `rgb(${c+10},${c-10},${c-20})`);
                    grad.addColorStop(1, `rgb(${c-30},${c-40},${c-50})`);
                    ctx.fillStyle = grad;
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    const verts = obj.vertices;
                    for (let i = 0; i < verts.length; i++) {
                        const r = verts[i].radius;
                        const a = verts[i].angle + obj.rotation * 0.1;
                        const x = Math.cos(a) * r;
                        const y = Math.sin(a) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    // Skaduwee kraters
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    for (let i = 0; i < 3; i++) {
                        const a = (i / 3) * Math.PI * 2 + 0.3;
                        const d = obj.size * 0.3;
                        const cr = 2 + Math.random() * 4;
                        ctx.beginPath();
                        ctx.arc(Math.cos(a) * d, Math.sin(a) * d, cr, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0;

                } else {
                    // SATELLIET
                    const s = obj.size * 0.5;
                    // Lyf
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.shadowBlur = 10;
                    const grad = ctx.createLinearGradient(-s * 0.5, -s * 0.6, s * 0.5, s * 0.6);
                    grad.addColorStop(0, '#b0b8c8');
                    grad.addColorStop(0.3, '#d0d8e8');
                    grad.addColorStop(0.7, '#a0a8b8');
                    grad.addColorStop(1, '#708090');
                    ctx.fillStyle = grad;
                    ctx.fillRect(-s * 0.5, -s * 0.6, s, s * 1.2);

                    // Antenna
                    ctx.strokeStyle = '#c0c8d8';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.6);
                    ctx.lineTo(0, -s * 1.0);
                    ctx.stroke();
                    ctx.fillStyle = '#ff6b6b';
                    ctx.beginPath();
                    ctx.arc(0, -s * 1.0, 2.5, 0, Math.PI * 2);
                    ctx.fill();

                    // Sonpanele
                    ctx.shadowBlur = 4;
                    const pa = obj.panelAngle || 0;
                    const panelW = s * 0.9;
                    const panelH = s * 0.3;

                    // Links
                    ctx.save();
                    ctx.translate(-s * 0.5, 0);
                    ctx.rotate(pa * 0.2);
                    ctx.fillStyle = '#1a2a4a';
                    ctx.fillRect(-panelW, -panelH * 0.5, panelW, panelH);
                    ctx.fillStyle = '#2a4a7a';
                    ctx.fillRect(-panelW + 2, -panelH * 0.5 + 2, panelW - 4, panelH - 4);
                    // lyne op paneel
                    ctx.strokeStyle = 'rgba(100,160,255,0.2)';
                    ctx.lineWidth = 0.5;
                    for (let i = 0; i < 4; i++) {
                        const lx = -panelW + 4 + i * (panelW - 8) / 3;
                        ctx.beginPath();
                        ctx.moveTo(lx, -panelH * 0.5 + 2);
                        ctx.lineTo(lx, panelH * 0.5 - 2);
                        ctx.stroke();
                    }
                    ctx.restore();

                    // Regs
                    ctx.save();
                    ctx.translate(s * 0.5, 0);
                    ctx.rotate(-pa * 0.2);
                    ctx.fillStyle = '#1a2a4a';
                    ctx.fillRect(0, -panelH * 0.5, panelW, panelH);
                    ctx.fillStyle = '#2a4a7a';
                    ctx.fillRect(2, -panelH * 0.5 + 2, panelW - 4, panelH - 4);
                    ctx.strokeStyle = 'rgba(100,160,255,0.2)';
                    ctx.lineWidth = 0.5;
                    for (let i = 0; i < 4; i++) {
                        const lx = 4 + i * (panelW - 8) / 3;
                        ctx.beginPath();
                        ctx.moveTo(lx, -panelH * 0.5 + 2);
                        ctx.lineTo(lx, panelH * 0.5 - 2);
                        ctx.stroke();
                    }
                    ctx.restore();

                    // Knoppies / liggies
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#00ff88';
                    ctx.beginPath();
                    ctx.arc(s * 0.3, -s * 0.2, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff4444';
                    ctx.beginPath();
                    ctx.arc(s * 0.3, s * 0.2, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                ctx.restore();
            }
        }

        // ============================================================
        //   RENDER (CANVAS)
        // ============================================================
        function draw() {
            const W = canvas.width;
            const H = canvas.height;

            updateCamera();
            updateFlyingObjects();

            ctx.clearRect(0, 0, W, H);

            drawBackground(ctx, W, H);
            drawGround(ctx, W, H);
            const stackTopY = drawBlocks(ctx, W, H);
            drawCharacter(ctx, W, H, stackTopY);
            drawFlyingObjects(ctx);
            drawEffects(ctx, W, H);

            // ---- UI op canvas ----
            const lvl = stack.length;
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = 'bold 14px "Segoe UI",sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`🔥 ${streak}`, 16, 32);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '12px "Segoe UI",sans-serif';
            ctx.fillText(`📦 ${stack.length}`, 16, 52);

            // Hoogte-aanwyser
            const screenStackH = stack.length * BLOCK_H;
            const barY = GROUND_Y - cameraOffset - screenStackH - 8;
            if (barY > -20 && barY < H + 20) {
                ctx.fillStyle = 'rgba(255,255,255,0.10)';
                ctx.fillRect(W - 12, Math.max(0, barY), 6, Math.min(screenStackH + 8, H - barY));
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.font = '11px "Segoe UI",sans-serif';
                ctx.textAlign = 'right';
                const labelY = Math.max(16, barY + 4);
                ctx.fillText(`${stack.length}`, W - 20, labelY);
            }

            // Status: Ruimte / Aarde
            let statusText = '';
            let statusColor = '#94a3b8';
            let emoji = '🌍';
            if (lvl >= 20) { statusText = 'Ruimte';
                emoji = '🌙';
                statusColor = '#a78bfa'; } else if (lvl >= 16) { statusText = 'Hoog in die lug';
                emoji = '☁️';
                statusColor = '#60a5fa'; } else if (lvl >= 11) { statusText = 'Bo die wolke';
                emoji = '☁️';
                statusColor = '#fbbf24'; } else { statusText = 'Aarde';
                emoji = '🌍';
                statusColor = '#4ade80'; }
            ctx.fillStyle = statusColor;
            ctx.font = 'bold 13px "Segoe UI",sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`${emoji} ${statusText}`, W / 2, 30);

            // Vlak nommer
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.font = '10px "Segoe UI",sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`vlak ${lvl}`, W - 12, H - 10);
        }

        // ---- AGTERGROND ----
        function drawBackground(ctx, W, H) {
            const lvl = stack.length;
            const t = Math.max(0, Math.min(1, (lvl - 11) / 9));

            // Donker blou vir ruimte (vanaf level 14+ sterker)
            const spaceFactor = Math.max(0, Math.min(1, (lvl - 12) / 8));

            const skyR = 11 - spaceFactor * 8;
            const skyG = 42 - spaceFactor * 30;
            const skyB = 74 + spaceFactor * 60;

            const midR = 26 - spaceFactor * 10;
            const midG = 74 - spaceFactor * 40;
            const midB = 122 + spaceFactor * 80;

            const lowR = 74 - spaceFactor * 20;
            const lowG = 141 - spaceFactor * 60;
            const lowB = 187 + spaceFactor * 50;

            const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y - cameraOffset);
            grad.addColorStop(0, `rgb(${skyR},${skyG},${skyB})`);
            grad.addColorStop(0.3, `rgb(${midR},${midG},${midB})`);
            grad.addColorStop(0.6, `rgb(${lowR},${lowG},${lowB})`);
            grad.addColorStop(0.85, `rgb(${lowR+20},${lowG+20},${lowB+20})`);
            grad.addColorStop(1, `rgb(${lowR+40},${lowG+30},${lowB+20})`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, GROUND_Y - cameraOffset + 20);

            // ---- Sterre (vanaf level 11) ----
            if (lvl >= 11) {
                const starBrightness = Math.min(1, (lvl - 10) / 5);
                stars.forEach(s => {
                    const twinkle = 0.5 + 0.5 * Math.sin(Date.now() * s.twinkle + s.phase);
                    const alpha = s.a * starBrightness * (0.5 + 0.5 * twinkle);
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r * (0.7 + 0.3 * twinkle), 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            }

            // ---- MAAN (in plaas van son/planeet) ----
            if (lvl >= 14) {
                const moonX = 700 + Math.sin(Date.now() * 0.0002) * 20;
                const moonY = 65 + Math.sin(Date.now() * 0.0004 + 1.2) * 12;
                const mr = 32 + Math.sin(Date.now() * 0.0003) * 1.5;

                // Gloed
                const glow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, mr * 3);
                glow.addColorStop(0, 'rgba(200,200,220,0.15)');
                glow.addColorStop(0.3, 'rgba(180,180,200,0.08)');
                glow.addColorStop(1, 'rgba(180,180,200,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(moonX, moonY, mr * 3, 0, Math.PI * 2);
                ctx.fill();

                // Maan lyf
                const moonGrad = ctx.createRadialGradient(
                    moonX - mr * 0.25, moonY - mr * 0.25, mr * 0.1,
                    moonX, moonY, mr
                );
                moonGrad.addColorStop(0, '#f0f0f5');
                moonGrad.addColorStop(0.2, '#e0e4ec');
                moonGrad.addColorStop(0.5, '#c8ced8');
                moonGrad.addColorStop(0.75, '#a8b0bc');
                moonGrad.addColorStop(1, '#889098');
                ctx.shadowColor = 'rgba(200,200,230,0.15)';
                ctx.shadowBlur = 40;
                ctx.fillStyle = moonGrad;
                ctx.beginPath();
                ctx.arc(moonX, moonY, mr, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Kraters op die maan
                const craters = [
                    { x: -0.3, y: -0.25, r: 0.2 },
                    { x: 0.35, y: -0.1, r: 0.15 },
                    { x: 0.1, y: 0.3, r: 0.18 },
                    { x: -0.4, y: 0.2, r: 0.12 },
                    { x: 0.5, y: 0.3, r: 0.08 },
                    { x: -0.15, y: -0.4, r: 0.10 },
                    { x: 0.25, y: -0.35, r: 0.07 },
                ];
                for (const cr of craters) {
                    const cx = moonX + cr.x * mr;
                    const cy = moonY + cr.y * mr;
                    const crr = cr.r * mr;
                    ctx.fillStyle = 'rgba(70,75,85,0.25)';
                    ctx.beginPath();
                    ctx.arc(cx, cy, crr, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(200,205,215,0.15)';
                    ctx.beginPath();
                    ctx.arc(cx - crr * 0.2, cy - crr * 0.2, crr * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(80,85,95,0.15)';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.arc(cx, cy, crr, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Maanlig
                ctx.fillStyle = 'rgba(255,255,255,0.04)';
                ctx.beginPath();
                ctx.arc(moonX - mr * 0.6, moonY - mr * 0.6, mr * 0.8, 0, Math.PI * 2);
                ctx.fill();
            }

            // ---- Wolke (vervaag tot level 16) ----
            const cloudAlpha = Math.max(0, 1 - (lvl - 8) / 8);
            if (cloudAlpha > 0 && lvl < 16) {
                for (let i = 0; i < 6; i++) {
                    const cx = ((i * 137 + 50) % 900) - 50 + Math.sin(Date.now() * 0.0001 + i * 2) * 20;
                    const cy = 30 + ((i * 73 + 20) % 130) + Math.sin(Date.now() * 0.00008 + i * 1.5) * 10;
                    const cw = 60 + ((i * 31 + 10) % 80);
                    const op = (0.2 + 0.3 * (1 - i / 7)) * cloudAlpha;
                    ctx.globalAlpha = op;
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    const r = cw * 0.45;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, r, r * 0.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cx - r * 0.6, cy + 6, r * 0.6, r * 0.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cx + r * 0.6, cy + 6, r * 0.6, r * 0.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cx - r * 0.3, cy + 10, r * 0.7, r * 0.35, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cx + r * 0.3, cy + 10, r * 0.7, r * 0.35, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            // ---- Heuwels (vervaag) ----
            const hillAlpha = Math.max(0, 1 - (lvl - 8) / 10);
            if (hillAlpha > 0 && lvl < 18) {
                ctx.globalAlpha = hillAlpha * 0.4;
                ctx.fillStyle = 'rgba(34,80,50,0.2)';
                ctx.beginPath();
                ctx.moveTo(0, GROUND_Y - cameraOffset);
                for (let x = 0; x <= W; x += 2) {
                    const y = GROUND_Y - cameraOffset - 18 - Math.sin(x * 0.008) * 28 - Math.sin(x * 0.015 + 1.2) * 14;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(W, GROUND_Y - cameraOffset);
                ctx.fill();

                ctx.fillStyle = 'rgba(44,100,60,0.15)';
                ctx.beginPath();
                ctx.moveTo(0, GROUND_Y - cameraOffset);
                for (let x = 0; x <= W; x += 2) {
                    const y = GROUND_Y - cameraOffset - 10 - Math.sin(x * 0.012 + 3) * 20 - Math.sin(x * 0.02 + 0.5) * 10;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(W, GROUND_Y - cameraOffset);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // ---- GROND ----
        function drawGround(ctx, W, H) {
            const lvl = stack.length;
            const groundScreenY = GROUND_Y - cameraOffset;
            if (groundScreenY > H + 20) return;

            const fade = Math.max(0, Math.min(1, 1 - (lvl - 10) / 10));
            if (fade < 0.01) return;

            ctx.globalAlpha = fade;
            const gY = groundScreenY;

            const grd = ctx.createLinearGradient(0, gY, 0, H);
            grd.addColorStop(0, '#3a7a4a');
            grd.addColorStop(0.15, '#2d6a3a');
            grd.addColorStop(0.5, '#4a3a2a');
            grd.addColorStop(1, '#2a1f14');
            ctx.fillStyle = grd;
            ctx.fillRect(0, gY, W, H - gY + 10);

            ctx.strokeStyle = '#4a9a5a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let x = 0; x <= W; x += 4) {
                const yy = gY - 2 - Math.sin(x * 0.1) * 3 - Math.sin(x * 0.05 + 2) * 2;
                if (x === 0) ctx.moveTo(x, yy);
                else ctx.lineTo(x, yy);
            }
            ctx.stroke();

            ctx.strokeStyle = '#4a8a4a';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < 50; i++) {
                const x = (i / 50) * W + Math.sin(i * 1.7) * 12;
                const h = 6 + Math.sin(i * 2.3) * 4;
                ctx.beginPath();
                ctx.moveTo(x, gY);
                ctx.quadraticCurveTo(x + Math.sin(i * 0.9) * 4, gY - h - 2, x + Math.sin(i * 1.1) * 6, gY - h);
                ctx.stroke();
            }

            ctx.globalAlpha = 1;
        }

        // ---- BLOKKE ----
        function drawBlocks(ctx, W, H) {
            const total = stack.length;
            const startY = GROUND_Y - cameraOffset - BLOCK_H;

            for (let i = 0; i < total; i++) {
                const color = stack[i];
                const y = startY - i * BLOCK_H;
                const x = W / 2 - BLOCK_W / 2;
                const isTop = (i === total - 1);
                const animScale = (isTop && newBlockAnim < 1 && newBlockColor === color) ?
                    0.6 + 0.4 * newBlockAnim :
                    1;

                const bw = BLOCK_W * animScale;
                const bh = BLOCK_H * animScale;
                const ox = (BLOCK_W - bw) / 2;
                const oy = (BLOCK_H - bh) / 2;

                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 4;

                const grad = ctx.createLinearGradient(x, y, x + bw, y + bh);
                const c = hexToRgb(color);
                grad.addColorStop(0, `rgb(${c.r+40},${c.g+40},${c.b+40})`);
                grad.addColorStop(0.4, color);
                grad.addColorStop(1, `rgb(${c.r-30},${c.g-30},${c.b-30})`);
                ctx.fillStyle = grad;

                const rx = x + ox;
                const ry = y + oy;
                const rw = bw;
                const rh = bh;
                const radius = 4;

                ctx.beginPath();
                ctx.moveTo(rx + radius, ry);
                ctx.lineTo(rx + rw - radius, ry);
                ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + radius);
                ctx.lineTo(rx + rw, ry + rh - radius);
                ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - radius, ry + rh);
                ctx.lineTo(rx + radius, ry + rh);
                ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - radius);
                ctx.lineTo(rx, ry + radius);
                ctx.quadraticCurveTo(rx, ry, rx + radius, ry);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fillRect(rx + 6, ry + 3, rw - 12, 4);

                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1;
                ctx.strokeRect(rx, ry, rw, rh);
            }

            const topY = GROUND_Y - cameraOffset - total * BLOCK_H;
            return topY;
        }

        // ---- KARAKTER ----
        function drawCharacter(ctx, W, H, stackTopY) {
            const cx = W / 2;
            let cy = stackTopY - 8;

            if (charFalling) {
                fallVelocity += 0.6;
                cy += fallVelocity;
                fallRotation += 0.06;
                if (cy > GROUND_Y - cameraOffset + 60) {
                    charFalling = false;
                }
            }

            if (bounceAnim < 1) {
                bounceAnim += 0.08;
                const b = Math.sin(bounceAnim * Math.PI * 2) * 4 * (1 - bounceAnim);
                cy += b;
            }

            const sc = charScale;
            if (sc > 1) {
                charScale += (1 - charScale) * 0.08;
                if (Math.abs(charScale - 1) < 0.01) charScale = 1;
            }

            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(sc, sc);
            if (charFalling) {
                ctx.rotate(fallRotation);
            }

            const s = 1;

            ctx.shadowColor = 'rgba(0,0,0,0.25)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 4;

            const skinColor = '#fcd9b8';

            // Bene
            ctx.shadowBlur = 6;
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(-8 * s, 2 * s, 5 * s, 14 * s);
            ctx.fillRect(3 * s, 2 * s, 5 * s, 14 * s);

            // Skoene
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(-10 * s, 14 * s, 9 * s, 5 * s);
            ctx.fillRect(1 * s, 14 * s, 9 * s, 5 * s);

            // Lyf
            ctx.shadowBlur = 12;
            const bodyGrad = ctx.createLinearGradient(0, -20 * s, 0, 6 * s);
            bodyGrad.addColorStop(0, '#60a5fa');
            bodyGrad.addColorStop(1, '#2563eb');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.roundRect(-14 * s, -20 * s, 28 * s, 28 * s, 6 * s);
            ctx.fill();

            // Arms
            ctx.shadowBlur = 6;
            ctx.fillStyle = skinColor;
            ctx.save();
            ctx.translate(-16 * s, -14 * s);
            ctx.rotate(-0.2 + Math.sin(Date.now() * 0.003) * 0.06);
            ctx.fillRect(-2 * s, 0, 5 * s, 18 * s);
            ctx.restore();
            ctx.save();
            ctx.translate(16 * s, -14 * s);
            ctx.rotate(0.2 - Math.sin(Date.now() * 0.003 + 1) * 0.06);
            ctx.fillRect(-3 * s, 0, 5 * s, 18 * s);
            ctx.restore();

            // Kop
            ctx.shadowBlur = 10;
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.arc(0, -26 * s, 16 * s, 0, Math.PI * 2);
            ctx.fill();

            // Hare
            ctx.fillStyle = '#4a3728';
            ctx.beginPath();
            ctx.ellipse(0, -34 * s, 16 * s, 8 * s, 0, Math.PI, 0);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(-10 * s, -30 * s, 8 * s, 6 * s, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(10 * s, -30 * s, 8 * s, 6 * s, 0.3, 0, Math.PI * 2);
            ctx.fill();

            // Oë
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.ellipse(-6 * s, -28 * s, 5 * s, 6 * s, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(6 * s, -28 * s, 5 * s, 6 * s, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(-5 * s, -27 * s, 2.8 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(7 * s, -27 * s, 2.8 * s, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath();
            ctx.arc(-4 * s, -29 * s, 1.2 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(8 * s, -29 * s, 1.2 * s, 0, Math.PI * 2);
            ctx.fill();

            // Mond
            ctx.strokeStyle = '#8a5a4a';
            ctx.lineWidth = 1.5 * s;
            ctx.beginPath();
            ctx.arc(0, -22 * s, 6 * s, 0.1, Math.PI - 0.1);
            ctx.stroke();

            // Wange
            ctx.fillStyle = 'rgba(255,150,150,0.25)';
            ctx.beginPath();
            ctx.ellipse(-12 * s, -24 * s, 4 * s, 3 * s, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(12 * s, -24 * s, 4 * s, 3 * s, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            ctx.restore();
        }

        // ---- EFFEKTE ----
        function drawEffects(ctx, W, H) {
            if (newBlockAnim < 1) {
                newBlockAnim += 0.04;
                if (newBlockAnim > 1) newBlockAnim = 1;
                const count = 12;
                const progress = newBlockAnim;
                const color = newBlockColor || '#fbbf24';
                const topY = GROUND_Y - cameraOffset - stack.length * BLOCK_H;
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2 + progress * 0.5;
                    const dist = 30 + progress * 60;
                    const x = W / 2 + Math.cos(angle) * dist * progress;
                    const y = topY - 6 + Math.sin(angle) * dist * progress * 0.4;
                    const size = 3 + Math.random() * 4 * (1 - progress * 0.5);
                    ctx.globalAlpha = 0.8 * (1 - progress * 0.7);
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            if (charFalling) {
                const count = 10;
                const topY = GROUND_Y - cameraOffset - stack.length * BLOCK_H;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 20 + Math.random() * 40;
                    const x = W / 2 + Math.cos(angle) * dist;
                    const y = topY + Math.sin(angle) * dist * 0.3;
                    const size = 2 + Math.random() * 6;
                    ctx.globalAlpha = 0.4 * (1 - Math.random() * 0.5);
                    ctx.fillStyle = '#b8a080';
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
        }

        // ---- helper ----
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (r > w / 2) r = w / 2;
            if (r > h / 2) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 100, g: 100, b: 100 };
        }

        // ============================================================
        //   GAME LOOP
        // ============================================================
        let animFrame = null;

        function gameLoop() {
            draw();
            animFrame = requestAnimationFrame(gameLoop);
        }

        // ============================================================
        //   RESTART / QUIT
        // ============================================================
        function restartGame() {
            if (animFrame) cancelAnimationFrame(animFrame);
            initGame();
            if (animFrame) cancelAnimationFrame(animFrame);
            gameLoop();
        }

        function quitGame() {
            if (animFrame) cancelAnimationFrame(animFrame);
            gameOverOverlay.classList.remove('show');
            initGame();
            if (animFrame) cancelAnimationFrame(animFrame);
            gameLoop();
            answerInput.focus();
        }

        window.restartGame = restartGame;
        window.quitGame = quitGame;

        // ============================================================
        //   EVENT LISTENERS
        // ============================================================
        submitBtn.addEventListener('click', handleAnswer);

        answerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (!isGameOver && !isAnswering) {
                    handleAnswer();
                }
            }
        });

        quitBtn.addEventListener('click', () => {
            if (isGameOver) {
                quitGame();
            } else {
                if (confirm('Wil jy die spel stop? Jou vordering gaan verlore.')) {
                    quitGame();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (!isGameOver) answerInput.focus();
        });

        // ============================================================
        //   START
        // ============================================================
        initGame();
        gameLoop();
        answerInput.focus();

        console.log('🧱 Blok Stapel Chemie • Kamera volg die mannetjie!');
        console.log('🌙 Level 14+: maan verskyn, rotse en satelliete vlieg verby!');
        console.log('🌌 Level 20+: Ruimte!');
    </script>
